<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty Theta Sniper | Premium Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <span class="glitch" data-text="SNIPER_V3">SNIPER_V3</span>
            </div>
            <div class="header-stats">
                <div class="stat-item pulse">
                    <span class="label">STATUS</span>
                    <span class="value" id="bot-status">ONLINE</span>
                </div>
            </div>
        </header>

        <main>
            <section class="overview">
                <div class="card pnl-card">
                    <h3>Total Net P&L</h3>
                    <div class="huge-value" id="total-pnl">₹0.00</div>
                    <div class="sub-stat" id="win-rate">Win Rate: 0%</div>
                </div>
                <div class="card stat-grid">
                    <div class="mini-stat">
                        <span class="label">Best Day</span>
                        <span class="value green" id="best-trade">₹0</span>
                    </div>
                    <div class="mini-stat">
                        <span class="label">Worst Day</span>
                        <span class="value red" id="worst-trade">₹0</span>
                    </div>
                    <div class="mini-stat">
                        <span class="label">Total Trades</span>
                        <span class="value" id="total-trades">0</span>
                    </div>
                    <div class="mini-stat">
                        <span class="label">Avg/Trade</span>
                        <span class="value" id="avg-trade">₹0</span>
                    </div>
                </div>
            </section>

            <section class="charts">
                <div class="card chart-container">
                    <h3>Performance Curve (Equity)</h3>
                    <canvas id="equityChart"></canvas>
                </div>
            </section>

            <section class="journal">
                <div class="card journal-card">
                    <h3>Execution Journal</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Strategy</th>
                                    <th>Strike</th>
                                    <th>Points</th>
                                    <th>Net P&L</th>
                                    <th>Mode</th>
                                </tr>
                            </thead>
                            <tbody id="trade-body">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 Nifty Theta Sniper | Autonomous Trading Engine</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
